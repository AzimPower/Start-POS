    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/icon-16x16.png" />
    <link rel="shortcut icon" href="/favicon/favicon-96x96.png" />
    <script>
      (function () {
        var hash = window.location.hash || '';
        var isAppRoute = /^#\/.+/.test(hash);
        var ua = navigator.userAgent || '';
        var isCapacitorRuntime = !!(window.Capacitor && (!window.Capacitor.isNativePlatform || window.Capacitor.isNativePlatform()));
        var isAndroidWebView = /Android/i.test(ua) && /\bwv\b/i.test(ua);
        var isLikelyNativeApp =
          isCapacitorRuntime ||
          window.location.protocol === 'capacitor:' ||
          window.location.protocol === 'file:' ||
          (window.location.hostname === 'localhost' && isAndroidWebView);
        var hasOpenedAppBefore = false;
        try {
          hasOpenedAppBefore =
            localStorage.getItem('pos-has-logged-in') === '1' ||
            !!localStorage.getItem('pos-user');
        } catch (e) {
          hasOpenedAppBefore = false;
        }

        if (!isAppRoute) {
          window.location.replace((isLikelyNativeApp || hasOpenedAppBefore) ? '/#/login' : 'accueil.html');
        }
      })();
    </script>
    
    <!-- PWA / mobile meta -->
    <meta name="theme-color" content="#0ea5a4" />
  <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var isLocalhost = /^(localhost|127\.0\.0\.1|0\.0\.0\.0)$/i.test(window.location.hostname);
        if (!isLocalhost || !('serviceWorker' in navigator)) {
          return;
        }

        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          if (!registrations.length) {
            return;
          }

          return Promise.all(registrations.map(function (registration) {
            return registration.unregister();
          })).then(function () {
            if (!('caches' in window)) {
              return;
            }

            return caches.keys().then(function (keys) {
              return Promise.all(keys.map(function (key) {
                return caches.delete(key);
              }));
            });
          }).then(function () {
            var reloadKey = '__dev_sw_cleanup_done__';
            if (!sessionStorage.getItem(reloadKey)) {
              sessionStorage.setItem(reloadKey, '1');
              window.location.reload();
              return;
            }

            sessionStorage.removeItem(reloadKey);
          });
        }).catch(function () {
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
